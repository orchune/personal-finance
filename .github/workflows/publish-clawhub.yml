name: Publish to ClawHub

on:
  push:
    branches: [main]
    paths:
      - "skills/personal-finance/**"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install ClawHub CLI
        run: npm i -g clawhub

      - name: Authenticate
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "::error::CLAWHUB_TOKEN secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          clawhub login --token "$CLAWHUB_TOKEN"
          clawhub whoami
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      # Version comes from SKILL.md frontmatter (metadata.version), normalized
      # to semver (2.0 -> 2.0.0). Bump it there for each release; publishing an
      # already-published version fails, which catches forgotten bumps.
      - name: Publish skill
        run: |
          VERSION=$(awk -F'"' '/^  version:/ { print $2; exit }' skills/personal-finance/SKILL.md)
          case "$VERSION" in
            *.*.*) ;;
            *.*) VERSION="$VERSION.0" ;;
            *) echo "::error::Could not parse metadata.version from SKILL.md"; exit 1 ;;
          esac
          echo "Publishing version $VERSION"
          clawhub skill publish ./skills/personal-finance \
            --owner orchune \
            --slug personal-finance \
            --version "$VERSION" \
            --name "Orchune Personal Finance" \
            --changelog "$COMMIT_MESSAGE" \
            --source-repo "${{ github.repository }}" \
            --source-commit "${{ github.sha }}" \
            --source-ref "${{ github.ref_name }}" \
            --source-path skills/personal-finance
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Manual publish via workflow_dispatch' }}
